name: 删除指定推文

on:
  workflow_dispatch:
    inputs:
      tweet_ids:
        description: '要删除的推文 ID（多个用空格分隔，如 2056308011623481495 2056308011623481496）'
        required: true
      account:
        description: '账号目录名（留空则自动在所有账号里查找）'
        required: false
        default: ''

jobs:
  delete:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装依赖
        run: pip install requests beautifulsoup4 lxml --quiet

      - name: 拉取最新 archive.py（仅用 build-index）
        run: |
          curl -fsSL "https://raw.githubusercontent.com/sjshb57/Test/main/archive.py" -o /tmp/archive.py
          echo "archive.py $(wc -l < /tmp/archive.py) 行"

      - name: 删除推文文件并重建索引
        run: |
          IDS="${{ github.event.inputs.tweet_ids }}"
          IN_ACCT="${{ github.event.inputs.account }}"
          echo "要删除的推文 ID: $IDS"

          # 确定要处理的账号目录
          if [ -n "$IN_ACCT" ]; then
            ACCOUNTS="$IN_ACCT"
          else
            ACCOUNTS=$(ls -1 accounts 2>/dev/null | while IFS= read -r name; do
              [ -d "accounts/${name}/wayback_snapshots" ] && echo "$name"
            done)
          fi

          ANY_DELETED=0
          while IFS= read -r U; do
            [ -z "$U" ] && continue
            SNAP="accounts/${U}/wayback_snapshots"
            [ -d "$SNAP" ] || continue

            HIT=0
            for TID in $IDS; do
              # 删除该 id 对应的 html 和 json 文件
              for f in "$SNAP"/html/*status_${TID}.html "$SNAP"/json/*status_${TID}.json; do
                if [ -f "$f" ]; then
                  rm -f "$f"
                  echo "[$U] 删除 $(basename "$f")"
                  HIT=1; ANY_DELETED=1
                fi
              done
            done

            # 该账号有删除，就重建索引
            if [ "$HIT" -eq 1 ]; then
              echo "::group::[$U] 重建索引"
              ( cd "$SNAP/.." && python3 /tmp/archive.py build-index ) || echo "::warning::[$U] build-index 出错"
              echo "::endgroup::"
            fi
          done <<< "$ACCOUNTS"

          if [ "$ANY_DELETED" -eq 0 ]; then
            echo "::warning::没有找到这些推文 ID 对应的文件（可能已删除或 ID 不对）"
          fi

      - name: 推送
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "无变化，无需推送"
            exit 0
          fi
          git commit -m "🗑️ 删除推文 ${{ github.event.inputs.tweet_ids }} [skip ci]"
          git push
